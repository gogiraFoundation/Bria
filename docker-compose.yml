version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: bria-postgres
    environment:
      POSTGRES_DB: bria
      POSTGRES_USER: bria_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bria_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bria_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bria-network

  redis:
    image: redis:7-alpine
    container_name: bria-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-bria_redis_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-bria_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bria-network

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: bria-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - bria-network

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: bria-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - bria-network

  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: bria-api-gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bria_admin:${DB_PASSWORD:-bria_secure_password}@postgres:5432/bria
      REDIS_URL: redis://:${REDIS_PASSWORD:-bria_redis_password}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-bria_jwt_secret_key_change_in_production}
      JWT_ALGORITHM: HS256
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/api-gateway:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - bria-network

  ingestion-service:
    build:
      context: ./backend/services/ingestion
      dockerfile: Dockerfile
    container_name: bria-ingestion
    depends_on:
      - kafka
      - redis
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      REDIS_URL: redis://:${REDIS_PASSWORD:-bria_redis_password}@redis:6379/0
      MQTT_BROKER_HOST: ${MQTT_BROKER_HOST:-mosquitto}
      MQTT_BROKER_PORT: ${MQTT_BROKER_PORT:-1883}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./backend/services/ingestion:/app
    networks:
      - bria-network

  forecasting-service:
    build:
      context: ./backend/services/forecasting
      dockerfile: Dockerfile
    container_name: bria-forecasting
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bria_admin:${DB_PASSWORD:-bria_secure_password}@postgres:5432/bria
      REDIS_URL: redis://:${REDIS_PASSWORD:-bria_redis_password}@redis:6379/0
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./backend/services/forecasting:/app
      - ./models:/models
    networks:
      - bria-network

  frontend:
    build:
      context: ./frontend/dashboard
      dockerfile: Dockerfile
    container_name: bria-frontend
    depends_on:
      - api-gateway
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000/api
      REACT_APP_WS_URL: ws://localhost:8000/api/v1/ws
    volumes:
      - ./frontend/dashboard:/app
      - /app/node_modules
    networks:
      - bria-network

  prometheus:
    image: prom/prometheus:latest
    container_name: bria-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - bria-network

  grafana:
    image: grafana/grafana:latest
    container_name: bria-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3001:3000"
    networks:
      - bria-network

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: bria-mosquitto
    volumes:
      - ./backend/services/ingestion/mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"
      - "9001:9001"
    networks:
      - bria-network

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  prometheus_data:
  grafana_data:

networks:
  bria-network:
    driver: bridge

